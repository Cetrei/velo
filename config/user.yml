video:
  resolution:
    width: 1280
    height: 720
  target_fps: 30
  max_bitrate_kbps: 2500
  
behavior:
  launch_on_boot: false
  minimize_to_tray: true
  enable_reconnection_loop: true
  reconnection_interval_ms: 1000
  dev_mode_enabled: false

android:
  enable_foreground_service: true
  wake_lock_level: "partial"
  show_notification: true

connection:
  mode: "stun_p2p"
  stun_p2p: {}
  cloudflare_relay:
    tunnel_token: ""
