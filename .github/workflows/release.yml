name: Release

on:
  push:
    tags:
      - "v*"
      - "backend-v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  desktop:
    if: ${{ !startsWith(github.ref_name, 'backend-v') }}
    runs-on: windows-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache root Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-root-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-root-

      - name: Install root dependencies
        run: bun install

      - name: Sync version from tag
        run: bun run sync:version ${{ github.ref_name }}

      - name: Cache web Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            apps/web/node_modules
          key: ${{ runner.os }}-bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Build web frontend
        working-directory: apps/web
        run: bun run build

      - name: Cache server Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            apps/server/node_modules
          key: ${{ runner.os }}-bun-server-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-server-

      - name: Compile backend binary for the desktop sidecar
        run: bun run build:server

      - name: Prepare backend sidecar for Tauri bundling
        run: bun scripts/prepare-backend-sidecar.mjs

      - name: Build and sign desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          configPath: apps/desktop/tauri.conf.json
          releaseDraft: true
          tagName: ${{ github.ref_name }}
          releaseName: "Velo ${{ github.ref_name }}"

  android:
    if: ${{ !startsWith(github.ref_name, 'backend-v') }}
    runs-on: ubuntu-latest
    env:
      VELO_ANDROID_KEYSTORE_BASE64: ${{ secrets.VELO_ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache root Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-root-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-root-

      - name: Install root dependencies
        run: bun install

      - name: Sync version from tag
        shell: bash
        run: bun run sync:version ${{ github.ref_name }}

      - name: Decode Android signing keystore
        if: ${{ env.VELO_ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$VELO_ANDROID_KEYSTORE_BASE64" | base64 -d > apps/web/android/app/velo-upload.keystore

      - name: Cache web Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            apps/web/node_modules
          key: ${{ runner.os }}-bun-web-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Sync Capacitor Android project
        run: bun run install:android

      - name: Build Android release APK
        env:
          VELO_ANDROID_STORE_PASSWORD: ${{ secrets.VELO_ANDROID_STORE_PASSWORD }}
          VELO_ANDROID_KEY_ALIAS: ${{ secrets.VELO_ANDROID_KEY_ALIAS }}
          VELO_ANDROID_KEY_PASSWORD: ${{ secrets.VELO_ANDROID_KEY_PASSWORD }}
        run: bun run build:android

      - name: Publish Android release asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: bin/android/*.apk

  backend:
    if: ${{ startsWith(github.ref_name, 'backend-v') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache root Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-root-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-root-

      - name: Install root dependencies
        run: bun install

      - name: Sync backend version from tag
        if: ${{ startsWith(github.ref_name, 'backend-v') }}
        run: bun run sync:version ${{ github.ref_name }}

      - name: Cache server Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            apps/server/node_modules
          key: ${{ runner.os }}-bun-server-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-server-

      - name: Compile backend binary
        run: bun run build:server

      - name: Publish backend release asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          make_latest: "false"
          tag_name: ${{ github.ref_name }}
          files: bin/backend/*.exe

  publish-app-release:
    needs: [desktop, android]
    if: ${{ success() && !startsWith(github.ref_name, 'backend-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release so auto-updaters can find it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --latest --repo ${{ github.repository }}

  publish-backend-release:
    needs: [backend]
    if: ${{ success() && startsWith(github.ref_name, 'backend-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release so the Backend updater can find it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --latest=false --repo ${{ github.repository }}

