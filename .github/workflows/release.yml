name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: bun install

      - name: Sync version from tag
        shell: cmd
        run: bun run sync:version ${{ github.ref_name }}

      - name: Build web frontend
        working-directory: apps/web
        run: bun install && bun run build

      - name: Build and sign desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          configPath: apps/desktop/tauri.conf.json
          releaseDraft: true
          tagName: ${{ github.ref_name }}
          releaseName: "Velo ${{ github.ref_name }}"

  android:
    runs-on: ubuntu-latest
    env:
      VELO_ANDROID_KEYSTORE_BASE64: ${{ secrets.VELO_ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install root dependencies
        run: bun install

      - name: Sync version from tag
        shell: bash
        run: bun run sync:version ${{ github.ref_name }}

      - name: Decode Android signing keystore
        if: ${{ env.VELO_ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$VELO_ANDROID_KEYSTORE_BASE64" | base64 -d > apps/web/android/app/velo-upload.keystore

      - name: Install web dependencies
        working-directory: apps/web
        run: bun install

      - name: Sync Capacitor Android project
        run: bun run install:android

      - name: Build Android release APK
        env:
          VELO_ANDROID_STORE_PASSWORD: ${{ secrets.VELO_ANDROID_STORE_PASSWORD }}
          VELO_ANDROID_KEY_ALIAS: ${{ secrets.VELO_ANDROID_KEY_ALIAS }}
          VELO_ANDROID_KEY_PASSWORD: ${{ secrets.VELO_ANDROID_KEY_PASSWORD }}
        run: bun run build:android

      - name: Publish Android release asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: bin/android/*.apk
