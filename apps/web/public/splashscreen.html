<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Velo</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }
  body {
    width: 420px;
    height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-family: system-ui, -apple-system, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  .splash-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    height: 100%;
    background: #12131C;
    border-radius: 20px;
    border: 1px solid #1E2030;
    animation: fadeIn 220ms ease-out;
  }
  .logo-ring {
    animation: pulse 1.8s ease-in-out infinite;
  }
  .brand-name {
    color: #F3F4F6;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin: 0;
  }
  .status-text {
    color: #9CA3AF;
    font-size: 12px;
    margin: 0;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  body.is-closing .splash-card {
    animation: fadeOut 200ms ease-in forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="splash-card">
    <svg class="logo-ring" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="56" height="56" fill="none">
      <circle cx="50" cy="50" r="45" stroke="#1E2030" stroke-width="2"/>
      <path d="M25,50 C35,30 65,30 75,50 C65,70 35,70 25,50 Z" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="50" cy="50" r="12" fill="#12131C" stroke="#F3F4F6" stroke-width="3"/>
      <circle cx="47" cy="47" r="3" fill="#6366F1"/>
      <circle cx="75" cy="50" r="4" fill="#10B981"/>
    </svg>
    <p class="brand-name">VELO</p>
    <p class="status-text">Connecting to your stream…</p>
  </div>
</body>
</html>
