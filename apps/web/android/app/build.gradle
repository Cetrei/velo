apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

import java.util.Properties

def javaVersion = (project.findProperty("veloJavaVersion") ?: "21").toInteger()
def androidHome = project.findProperty("veloAndroidHome") ?: "NO_ENCONTRADO"

println ">>> [VELD] Java version from props: ${javaVersion}"
println ">>> [VELD] ANDROID_HOME from props: ${androidHome}"

// Local dev: apps/web/android/keystore.properties (gitignored, copy from keystore.properties.example
// which lives in the same apps/web/android/ folder, one level above this build.gradle).
// CI: VELO_ANDROID_STORE_PASSWORD / VELO_ANDROID_KEY_ALIAS / VELO_ANDROID_KEY_PASSWORD env vars,
// with the decoded keystore file placed at app/velo-upload.keystore before the build runs.
def keystorePropsFile = file('../keystore.properties')
def veloSigningConfig = null
if (keystorePropsFile.exists()) {
    def props = new Properties()
    keystorePropsFile.withInputStream { props.load(it) }
    def storeFilePath = props.getProperty('storeFile')
    def resolvedStoreFile = file(storeFilePath)
    if (!resolvedStoreFile.exists()) {
        resolvedStoreFile = file("../${storeFilePath}")
    }
    veloSigningConfig = [
        storeFile: resolvedStoreFile,
        storePassword: props.getProperty('storePassword'),
        keyAlias: props.getProperty('keyAlias'),
        keyPassword: props.getProperty('keyPassword'),
    ]
    if (!resolvedStoreFile.exists()) {
        println ">>> [VELD] WARNING: keystore.properties found but storeFile does not exist at ${resolvedStoreFile.absolutePath}, release APK will fail to sign"
    } else {
        println ">>> [VELD] Signing release APK with keystore at ${resolvedStoreFile.absolutePath}"
    }
} else if (System.getenv('VELO_ANDROID_STORE_PASSWORD')) {
    veloSigningConfig = [
        storeFile: file('velo-upload.keystore'),
        storePassword: System.getenv('VELO_ANDROID_STORE_PASSWORD'),
        keyAlias: System.getenv('VELO_ANDROID_KEY_ALIAS'),
        keyPassword: System.getenv('VELO_ANDROID_KEY_PASSWORD'),
    ]
} else {
    println ">>> [VELD] No keystore.properties and no VELO_ANDROID_STORE_PASSWORD env var found, release APKs will be unsigned"
}

android {
    namespace = "com.cetrei.velo"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.cetrei.velo"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode rootProject.ext.veloVersionCode
        versionName rootProject.ext.veloVersionName

        buildConfigField "String", "ANDROID_HOME_PATH", "\"${androidHome.replace('\\', '/')}\""

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.toVersion(javaVersion)
        targetCompatibility JavaVersion.toVersion(javaVersion)
    }

    kotlinOptions {
        jvmTarget = javaVersion.toString()
    }

    if (veloSigningConfig != null) {
        signingConfigs {
            release {
                storeFile veloSigningConfig.storeFile
                storePassword veloSigningConfig.storePassword
                keyAlias veloSigningConfig.keyAlias
                keyPassword veloSigningConfig.keyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (veloSigningConfig != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
