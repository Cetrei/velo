[[permission]]
identifier = "allow-push-frame"
description = "Allows pushing a decoded WebRTC video frame into the virtual camera driver."
commands.allow = ["push_frame"]

[[permission]]
identifier = "allow-get-system-config"
description = "Allows reading the bundled read-only system.yml config."
commands.allow = ["get_system_config"]

[[permission]]
identifier = "allow-get-user-config"
description = "Allows reading the user's writable user.yml config."
commands.allow = ["get_user_config"]

[[permission]]
identifier = "allow-save-user-config"
description = "Allows writing the user's writable user.yml config."
commands.allow = ["save_user_config"]

[[permission]]
identifier = "allow-close-splashscreen"
description = "Allows the frontend to signal that it has painted, closing the splashscreen window and showing the main window."
commands.allow = ["close_splashscreen"]

[[permission]]
identifier = "allow-check-backend-update"
description = "Allows checking GitHub Releases for a newer independently-versioned backend build."
commands.allow = ["check_backend_update"]

[[permission]]
identifier = "allow-install-backend-update"
description = "Allows downloading and installing a newer backend binary, restarting the backend sidecar in the process."
commands.allow = ["install_backend_update"]

[[permission]]
identifier = "allow-get-backend-status"
description = "Allows reading the currently running backend sidecar's version and health."
commands.allow = ["get_backend_status"]

[[permission]]
identifier = "allow-start-backend"
description = "Allows starting the backend sidecar on demand without restarting the desktop app."
commands.allow = ["start_backend"]

[[permission]]
identifier = "allow-uninstall-backend"
description = "Allows stopping the backend sidecar and removing its binary and data directory from disk."
commands.allow = ["uninstall_backend"]

[[permission]]
identifier = "allow-get-tunnel-status"
description = "Allows reading the currently managed cloudflared tunnel's running state and installed version."
commands.allow = ["get_tunnel_status"]

[[permission]]
identifier = "allow-check-tunnel-update"
description = "Allows checking cloudflare/cloudflared's GitHub Releases for a newer cloudflared build."
commands.allow = ["check_tunnel_update"]

[[permission]]
identifier = "allow-restart-managed-tunnel"
description = "Allows re-syncing and restarting the managed cloudflared tunnel against the current connection settings."
commands.allow = ["restart_managed_tunnel"]

[[set]]
identifier = "default"
description = "Default permission set granting access to all of Velo's own app-level commands."
permissions = [
  "allow-push-frame",
  "allow-get-system-config",
  "allow-get-user-config",
  "allow-save-user-config",
  "allow-close-splashscreen",
  "allow-check-backend-update",
  "allow-install-backend-update",
  "allow-get-backend-status",
  "allow-start-backend",
  "allow-uninstall-backend",
  "allow-get-tunnel-status",
  "allow-check-tunnel-update",
  "allow-restart-managed-tunnel",
]
