[[permission]]
identifier = "allow-push-frame"
description = "Allows pushing a decoded WebRTC video frame into the virtual camera driver."
commands.allow = ["push_frame"]

[[permission]]
identifier = "allow-get-system-config"
description = "Allows reading the bundled read-only system.yml config."
commands.allow = ["get_system_config"]

[[permission]]
identifier = "allow-get-user-config"
description = "Allows reading the user's writable user.yml config."
commands.allow = ["get_user_config"]

[[permission]]
identifier = "allow-save-user-config"
description = "Allows writing the user's writable user.yml config."
commands.allow = ["save_user_config"]

[[permission]]
identifier = "allow-close-splashscreen"
description = "Allows the frontend to signal that it has painted, closing the splashscreen window and showing the main window."
commands.allow = ["close_splashscreen"]

[[permission]]
identifier = "allow-check-server-update"
description = "Allows checking GitHub Releases for a newer independently-versioned server build."
commands.allow = ["check_server_update"]

[[permission]]
identifier = "allow-install-server-update"
description = "Allows downloading and installing a newer server binary, restarting the server sidecar in the process."
commands.allow = ["install_server_update"]

[[permission]]
identifier = "allow-install-server-from-bytes"
description = "Allows installing a developer-supplied server binary from raw bytes, bypassing the GitHub Releases lookup. Intended for dev-mode manual sideloading only."
commands.allow = ["install_server_from_bytes"]

[[permission]]
identifier = "allow-cancel-server-update"
description = "Allows cancelling an in-progress server download or installation."
commands.allow = ["cancel_server_update"]

[[permission]]
identifier = "allow-get-server-status"
description = "Allows reading the currently running server sidecar's version and health."
commands.allow = ["get_server_status"]

[[permission]]
identifier = "allow-start-server"
description = "Allows starting the server sidecar on demand without restarting the desktop app."
commands.allow = ["start_server"]

[[permission]]
identifier = "allow-restart-server"
description = "Allows killing and respawning the server sidecar on demand without restarting the desktop app."
commands.allow = ["restart_server"]

[[permission]]
identifier = "allow-stop-server"
description = "Allows stopping the running server sidecar on demand without uninstalling it."
commands.allow = ["stop_server"]

[[permission]]
identifier = "allow-uninstall-server"
description = "Allows stopping the server sidecar and removing its binary and data directory from disk."
commands.allow = ["uninstall_server"]

[[permission]]
identifier = "allow-get-tunnel-status"
description = "Allows reading the currently managed cloudflared tunnel's running state and installed version."
commands.allow = ["get_tunnel_status"]

[[permission]]
identifier = "allow-check-tunnel-update"
description = "Allows checking cloudflare/cloudflared's GitHub Releases for a newer cloudflared build."
commands.allow = ["check_tunnel_update"]

[[permission]]
identifier = "allow-restart-managed-tunnel"
description = "Allows re-syncing and restarting the managed cloudflared tunnel against the current connection settings."
commands.allow = ["restart_managed_tunnel"]

[[permission]]
identifier = "allow-get-driver-status"
description = "Allows reading whether the virtual camera DirectShow filter is currently registered in the Windows registry."
commands.allow = ["get_driver_status"]

[[permission]]
identifier = "allow-get-core-status"
description = "Allows reading Velo-Core's currently loaded version and ABI health, read-only, since Core updates itself automatically on startup."
commands.allow = ["get_core_status"]

[[set]]
identifier = "default"
description = "Default permission set granting access to all of Velo's own app-level commands."
permissions = [
  "allow-push-frame",
  "allow-get-system-config",
  "allow-get-user-config",
  "allow-save-user-config",
  "allow-close-splashscreen",
  "allow-check-server-update",
  "allow-install-server-update",
  "allow-install-server-from-bytes",
  "allow-cancel-server-update",
  "allow-get-server-status",
  "allow-start-server",
  "allow-restart-server",
  "allow-stop-server",
  "allow-uninstall-server",
  "allow-get-tunnel-status",
  "allow-check-tunnel-update",
  "allow-restart-managed-tunnel",
  "allow-get-driver-status",
  "allow-get-core-status",
]
